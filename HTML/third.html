<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Linking Tag : Here we link a url or a internal page. 
        a tag : anchor 
    -->
    <a href="https://www.facebook.com">This is facebook Link</a>
    <a href="second.html" target="_blank">This was previous class</a>

    <hr>

    <!-- iframe means particular window opens -->
    <iframe width="500" height="500" src="second.html" frameborder="40"></iframe>
    <!-- iframe tag is also used to inject a map or a youtube video -->
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3502.022135066298!2d77.37577607409416!3d28.62909868423916!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cef60526c0929%3A0xe3abc75d65b999ff!2sCodeSquadz%20-%20IT%20Training%20by%20Manish%20Bhatia%20Sir!5e0!3m2!1sen!2sin!4v1774161870423!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/9LwacpywVhs?si=UdnZby4i5vPIDVfT" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <hr>

    <!-- form tag -->
    <form>
        <fieldset>
            <legend>Registration Form</legend>
            <label for="fname">First Name :</label>
            <input type="text" id="fname">
            <br>
            <label for="">Last Name :</label>
            <input type="text">
            <br>
            <label for="">Gender :</label>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">Female
            <br>
            <label for="">Mobile No :</label>
            <input type="number">
            <br>
            <label for="">Email :</label>
            <input type="email">
            <br>
            <label for="">Password :</label>
            <input type="password">
            <br>
            <label for="">Hobbies :</label>
            <input type="checkbox"> Reading
            <input type="checkbox"> Writing
            <input type="checkbox"> Cyclying
            <br>
            <label for="">Education :</label>
            <select name="" id="">
                <option value="">--Select any--</option>
                <option value="">10th Pass</option>
                <option value="">12th Pass</option>
                <option value="">Graduated</option>
                <option value="">Post Graduated</option>
            </select>
            <br>
            <label for="">Share Feedback :</label>
            <textarea name="" id=""></textarea>
            <br>
            <label for="">Upload Docs</label>
            <input type="file">
            <br>
            <label for="">Date of Birth :</label>
            <input type="date">
            <br>
            <input type="submit">
            <input type="reset">
        </fieldset>
    </form>
</body>
</html>
