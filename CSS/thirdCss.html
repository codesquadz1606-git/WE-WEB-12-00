<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{
        width: 300px;
        height: 300px;
        background-color: red;

        /* transition-property: all;
        transition-duration: 2s;
        transition-timing-function: ease-in-out;
        transition-delay: 2s; */

        /* Shorthand */
        transition: all 0.2s ease-in-out 2s; /*propert duration timing-function delay*/
    }

    .box:hover{
        background-color: blue;
        border-radius: 50px;
    }

    .container{
        display: flex;
        /* 
            gap,justify-content,flex-properties
        */

        /* gap: 50px; */

        /* justify-content: space-between; */
        /* justify-content: space-around; */
        /* justify-content: space-evenly; */
        /* justify-content: center; */
        /* justify-content: flex-end; */
        /* justify-content: flex-start; */

        /* flex-direction: column; */
        /* flex-direction: column-reverse; */
        flex-wrap: wrap;
    }

    .box1{
        width: 300px;
        height: 300px;
        border: 5px solid black;
    }

    .con{
        width: 200px;
        height: 200px;
        background-color: green;

        animation: moveBox 3s ease-in-out infinite 2s;
        position: relative;
    }

    @keyframes moveBox {
        0%{
            top: 0px;
            left: 0px;
        }
        25%{
            top: 300px;
            left:0px;
        }
        50%{
            top: 300px;
            left: 300px;
        }
        75%{
            top: 0px;
            left: 300px;
        }
        100%{
            top: 0px;
            left: 0px;
        }
    }

    .slider{
        width: 90%;
        height: 500px;
        border: 2px solid black;
        margin: auto;
        border-radius: 40px;

        animation: slider 20s ease-in-out infinite alternate;
    }

    @keyframes slider {
        0%{
            background-image: url(./assets/1.jpg);
            background-size: cover;
            background-position: center;
        }
        30%{
            background-image: url(./assets/2.jpg);
            background-size: cover;
            background-position: center;
        }
        60%{
            background-image: url(./assets/3.jpg);
            background-size: cover;
            background-position: center;
        }
        100%{
            background-image: url(./assets/4.jpg);
            background-size: cover;
            background-position: center;
        }
    }
</style>
<body>
    <!--
        hover : It means to change the state from one to anthor when our mouse is over it.
        transition : To add some time or smoothness from one state to anthor.
        flex : flex properties : it works on one dimensional
        animation
        responsive design
    -->

        <div class="box1"></div>
        <div class="box1"></div>
        <div class="box1"></div>
    </div> -->

    <!-- <div class="con"></div> -->

    <div class="slider"></div>

</body>
</html>
