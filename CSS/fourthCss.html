<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box-1{
        background-color: red;
        padding: 20px;
        font-size: 1.5rem;
        text-align: center;
        font-weight: bolder;
    }
    .box-2{
        background-color: blue;
        padding: 20px;
        font-size: 1.5rem;
        text-align: center;
        font-weight: bolder;
    }
    .box-3{
        background-color: yellow;
        padding: 20px;
        font-size: 1.5rem;
        text-align: center;
        font-weight: bolder;
    }
    .box-4{
        background-color: green;
        padding: 20px;
        font-size: 1.5rem;
        text-align: center;
        font-weight: bolder;
    }

    .box-1,.box-2,.box-3,.box-4{
        display: none;
    }

    @media (min-width:1500px) {
        .box-1{
            display: block;
        }
    }

    @media (min-width:1280px) and (max-width:1499px) {
        .box-2{
            display: block;
        }
    }

    @media (min-width:980px) and (max-width:1279px) {
        .box-3{
            display: block;
        }
    }

    @media (min-width:570px) and (max-width:979px) {
        .box-4{
            display: block;
        }
    }

    @media (max-width:569px) {
        .box-1,.box-2,.box-3,.box-4{
            display: block;
        }
    }

    .sc1-content{
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .screen2{
        display: none;
    }

    .sc2-content{
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    @media (max-width:1023px) {
        .screen2{
            display: block;
        }

        .screen1{
            display: none;
        }
    }
</style>
<body>
    <!-- 
        What is Responsive Design?
        The design is divided into the multiple screens.

        >=1500px : 15.6 inch laptop 
        1280 to 1499px : 13 to 14 inch laptop
        980px to 1279px : tablet screen
        570px to 979px : phone screens
    -->

        This is box - 1

    <div class="box-2">

    </div>
    <div class="box-3">
        This is box - 3
    </div>
    <div class="box-4">
        This is box - 4
    </div> -->

    <div class="screen1">
        <div class="sc1-content">
            <div class="logo">
                <h1>Loop Earplugs</h1>
            </div>
            <div class="navigation">
                <span>Shop</span>
                <span>Shop</span>
                <span>Shop</span>
                <span>Shop</span>
                <span>Shop</span>
            </div>
            <div class="buttons">
                <button>flag</button>
                <button>Account</button>
                <button>Cart</button>
            </div>
        </div>
    </div>

    <div class="screen2">
        <div class="sc2-content">
            <div class="ham">
                <button>Ham</button>
            </div>
            <div class="logo">
                <h1>Loop Earplugs</h1>
            </div>
            <div class="buttons">
                <button>flag</button>
                <button>Account</button>
                <button>Cart</button>
            </div>
        </div>
    </div>
</body>
</html>
